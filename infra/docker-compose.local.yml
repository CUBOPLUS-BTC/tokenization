name: tokenization-local

services:
  postgres:
    image: postgres:15-alpine
    container_name: tokenization-postgres
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.local
        required: false
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform

  redis:
    image: redis:7-alpine
    container_name: tokenization-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform

  bitcoind:
    image: lncm/bitcoind:v28.0
    container_name: tokenization-bitcoind
    user: "0:0"
    command:
      - -datadir=/data/.bitcoin
      - -printtoconsole
    restart: unless-stopped
    volumes:
      - ./infra/bitcoin/bitcoin.conf:/data/.bitcoin/bitcoin.conf:ro
      - bitcoin_data:/data/.bitcoin
    ports:
      - "18444:18443"
    healthcheck:
      test: ["CMD", "bitcoin-cli", "-regtest", "-rpcuser=local_rpc", "-rpcpassword=local_rpc_password", "getblockchaininfo"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - platform

  lnd:
    image: lightninglabs/lnd:v0.20.0-beta
    container_name: tokenization-lnd
    restart: unless-stopped
    command:
      - --lnddir=/data/lnd
      - --configfile=/etc/lnd/lnd.conf
    depends_on:
      bitcoind:
        condition: service_healthy
    volumes:
      - ./infra/lnd/lnd.conf:/etc/lnd/lnd.conf:ro
      - lnd_data:/data/lnd
    ports:
      - "10009:10009"
      - "9735:9735"
    healthcheck:
      test: ["CMD", "lncli", "--network=regtest", "--rpcserver=localhost:10009", "--tlscertpath=/data/lnd/tls.cert", "--macaroonpath=/data/lnd/data/chain/bitcoin/regtest/admin.macaroon", "getinfo"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - platform

  elementsd:
    build:
      context: ./infra/elements
      dockerfile: Dockerfile
    container_name: tokenization-elementsd
    restart: unless-stopped
    depends_on:
      bitcoind:
        condition: service_healthy
    environment:
      ELEMENTS_CONF_FILE: /etc/elements/elements.conf
      ELEMENTS_DATA_DIR: /data/elements
      ELEMENTS_NETWORK: elementsregtest
      ELEMENTS_RPC_USER: user
      ELEMENTS_RPC_PASSWORD: pass
      ELEMENTS_RPC_PORT: "7041"
      ELEMENTS_WALLET_NAME: platform
    volumes:
      - ./infra/elements/elements.conf:/etc/elements/elements.conf:ro
      - elements_data:/data/elements
    ports:
      - "7041:7041"
    healthcheck:
      test: ["CMD", "elements-cli", "-chain=elementsregtest", "-rpcuser=user", "-rpcpassword=pass", "-rpcport=7041", "-rpcwallet=platform", "getwalletinfo"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 25s
    networks:
      - platform

  migrate:
    build:
      context: .
      dockerfile: ./services/migrate/Dockerfile
    container_name: tokenization-migrate
    restart: "no"
    env_file:
      - path: ./infra/.env.local
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - platform

  wallet:
    build:
      context: .
      dockerfile: ./services/wallet/Dockerfile
    container_name: tokenization-wallet
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.local
        required: false
    volumes:
      - lnd_data:/run/secrets/lnd:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      bitcoind:
        condition: service_healthy
      lnd:
        condition: service_healthy
      elementsd:
        condition: service_healthy
    ports:
      - "8001:8001"
    networks:
      - platform

  auth:
    build:
      context: .
      dockerfile: ./services/auth/Dockerfile
    container_name: tokenization-auth
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.local
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8007:8000"
    networks:
      - platform

  tokenization:
    build:
      context: .
      dockerfile: ./services/tokenization/Dockerfile
    container_name: tokenization-tokenization
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.local
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      elementsd:
        condition: service_healthy
    ports:
      - "8002:8002"
    networks:
      - platform

  marketplace:
    build:
      context: .
      dockerfile: ./services/marketplace/Dockerfile
    container_name: tokenization-marketplace
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.local
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8003:8003"
    networks:
      - platform

  nostr:
    build:
      context: .
      dockerfile: ./services/nostr/Dockerfile
    container_name: tokenization-nostr
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.local
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8005:8005"
    networks:
      - platform

  admin:
    build:
      context: .
      dockerfile: ./services/admin/Dockerfile
    container_name: tokenization-admin
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.local
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8006:8006"
    networks:
      - platform

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: tokenization-gateway
    restart: unless-stopped
    depends_on:
      - auth
      - wallet
      - tokenization
      - marketplace
      - nostr
      - admin
    ports:
      - "8000:8000"
    networks:
      - platform

volumes:
  postgres_data:
  redis_data:
  bitcoin_data:
  lnd_data:
  elements_data:

networks:
  platform:
    driver: bridge


