name: tokenization-local

services:
  postgres:
    image: postgres:15-alpine
    container_name: tokenization-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform

  redis:
    image: redis:7-alpine
    container_name: tokenization-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform

  bitcoind:
    image: lncm/bitcoind:v28.0
    container_name: tokenization-bitcoind
    user: "0:0"
    command:
      - -regtest
      - -server=1
      - -datadir=/data/.bitcoin
      - -conf=/data/.bitcoin/bitcoin.conf
      - -printtoconsole
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=local_rpc
      - -rpcpassword=local_rpc_password
    restart: unless-stopped
    volumes:
      - ./infra/bitcoin/bitcoin.conf:/data/.bitcoin/bitcoin.conf:ro
      - bitcoin_data:/data/.bitcoin
    ports:
      - "18444:18444"
      - "18443:18443"
      - "28332:28332"
      - "28333:28333"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bitcoin-cli -regtest -datadir=/data/.bitcoin -rpcuser=local_rpc -rpcpassword=local_rpc_password getblockchaininfo >/dev/null 2>&1 || exit 1"
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - platform

  lnd:
    image: lightninglabs/lnd:v0.20.0-beta
    container_name: tokenization-lnd
    restart: unless-stopped
    command:
      - --lnddir=/data/lnd
      - --configfile=/etc/lnd/lnd.conf
      - --bitcoin.active
      - --bitcoin.regtest
      - --bitcoin.node=bitcoind
      - --bitcoind.rpchost=bitcoind:18443
      - --bitcoind.rpcuser=local_rpc
      - --bitcoind.rpcpass=local_rpc_password
      - --bitcoind.zmqpubrawblock=tcp://bitcoind:28332
      - --bitcoind.zmqpubrawtx=tcp://bitcoind:28333
    depends_on:
      bitcoind:
        condition: service_healthy
    volumes:
      - ./infra/lnd/lnd.conf:/etc/lnd/lnd.conf:ro
      - lnd_data:/data/lnd
    ports:
      - "10009:10009"
      - "9735:9735"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /data/lnd/tls.cert || exit 1"
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - platform

  elementsd:
    build:
      context: ./infra/elements
      dockerfile: Dockerfile
    container_name: tokenization-elementsd
    restart: unless-stopped
    depends_on:
      bitcoind:
        condition: service_healthy
    environment:
      ELEMENTS_CONF_FILE: /etc/elements/elements.conf
      ELEMENTS_DATA_DIR: /data/elements
      ELEMENTS_NETWORK: elementsregtest
      ELEMENTS_RPC_USER: user
      ELEMENTS_RPC_PASSWORD: pass
      ELEMENTS_RPC_PORT: "7041"
      ELEMENTS_WALLET_NAME: platform
    volumes:
      - ./infra/elements/elements.conf:/etc/elements/elements.conf:ro
      - elements_data:/data/elements
    ports:
      - "7041:7041"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "elements-cli -chain=elementsregtest -rpcuser=user -rpcpassword=pass -rpcport=7041 getblockchaininfo >/dev/null 2>&1 || exit 1"
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - platform

  migrate:
    build:
      context: .
      dockerfile: ./services/migrate/Dockerfile
    container_name: tokenization-migrate
    restart: "no"
    env_file:
      - path: ./infra/.env.regtest
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - platform

  auth:
    build:
      context: .
      dockerfile: ./services/auth/Dockerfile
    container_name: tokenization-auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - platform

  wallet:
    build:
      context: .
      dockerfile: ./services/wallet/Dockerfile
    container_name: tokenization-wallet
    restart: unless-stopped
    volumes:
      - lnd_data:/run/secrets/lnd:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      bitcoind:
        condition: service_healthy
      lnd:
        condition: service_healthy
      elementsd:
        condition: service_healthy
    networks:
      - platform

  tokenization:
    build:
      context: .
      dockerfile: ./services/tokenization/Dockerfile
    container_name: tokenization-tokenization
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      elementsd:
        condition: service_healthy
    networks:
      - platform

  marketplace:
    build:
      context: .
      dockerfile: ./services/marketplace/Dockerfile
    container_name: tokenization-marketplace
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - platform

  nostr:
    build:
      context: .
      dockerfile: ./services/nostr/Dockerfile
    container_name: tokenization-nostr
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - platform

  admin:
    build:
      context: .
      dockerfile: ./services/admin/Dockerfile
    container_name: tokenization-admin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - platform

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: tokenization-gateway
    restart: unless-stopped
    depends_on:
      - auth
      - wallet
      - tokenization
      - marketplace
      - nostr
      - admin
    networks:
      - platform

volumes:
  postgres_data:
  redis_data:
  bitcoin_data:
  lnd_data:
  elements_data:

networks:
  platform:
    driver: bridge