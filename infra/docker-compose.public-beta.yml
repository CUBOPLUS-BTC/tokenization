name: tokenization-public-beta

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.beta
        required: false
    volumes:
      - beta_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beta

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - beta_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beta

  migrate:
    build:
      context: .
      dockerfile: ./services/migrate/Dockerfile
    restart: "no"
    env_file:
      - path: ./infra/.env.beta
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - beta

  auth:
    build:
      context: .
      dockerfile: ./services/auth/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.beta
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - beta

  wallet:
    build:
      context: .
      dockerfile: ./services/wallet/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.beta
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - beta

  tokenization:
    build:
      context: .
      dockerfile: ./services/tokenization/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.beta
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - beta

  marketplace:
    build:
      context: .
      dockerfile: ./services/marketplace/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.beta
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - beta

  nostr:
    build:
      context: .
      dockerfile: ./services/nostr/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.beta
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - beta

  admin:
    build:
      context: .
      dockerfile: ./services/admin/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.beta
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - beta

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - auth
      - wallet
      - tokenization
      - marketplace
      - nostr
      - admin
    ports:
      - "8000:8000"
    networks:
      - beta

  prometheus:
    extends:
      file: ./infra/docker-compose.observability.yml
      service: prometheus
    networks:
      - beta

  alertmanager:
    extends:
      file: ./infra/docker-compose.observability.yml
      service: alertmanager
    networks:
      - beta

  grafana:
    extends:
      file: ./infra/docker-compose.observability.yml
      service: grafana
    networks:
      - beta

  blackbox:
    extends:
      file: ./infra/docker-compose.observability.yml
      service: blackbox
    networks:
      - beta

  cadvisor:
    extends:
      file: ./infra/docker-compose.observability.yml
      service: cadvisor
    networks:
      - beta

volumes:
  beta_postgres_data:
  beta_redis_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:

networks:
  beta:
    driver: bridge


