name: tokenization-public-beta

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.beta
        required: false
    volumes:
      - beta_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - beta_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: ./services/migrate/Dockerfile
    pull_policy: build
    restart: "no"
    labels:
      - "com.tokenization.migrate.role=one-shot"
    env_file:
      - path: ./infra/.env.beta
        required: false
    depends_on:
      postgres:
        condition: service_healthy

  auth:
    build:
      context: .
      dockerfile: ./services/auth/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.beta
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  wallet:
    build:
      context: .
      dockerfile: ./services/wallet/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.beta
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  tokenization:
    build:
      context: .
      dockerfile: ./services/tokenization/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.beta
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  marketplace:
    build:
      context: .
      dockerfile: ./services/marketplace/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.beta
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  nostr:
    build:
      context: .
      dockerfile: ./services/nostr/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.beta
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  admin:
    build:
      context: .
      dockerfile: ./services/admin/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.beta
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./infra/.env.beta
        required: false
    environment:
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS:-GET, POST, PUT, PATCH, DELETE, OPTIONS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:-Authorization, Content-Type, X-Requested-With, Accept, Origin, X-Request-ID, X-Correlation-ID, X-API-Key, X-2FA-Code, X-Idempotency-Key}
      CORS_EXPOSE_HEADERS: ${CORS_EXPOSE_HEADERS:-X-Request-ID}
      CORS_MAX_AGE: ${CORS_MAX_AGE:-86400}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
    ports:
      - "8000:8000"
    depends_on:
      - auth
      - wallet
      - tokenization
      - marketplace
      - nostr
      - admin

volumes:
  beta_postgres_data:
  beta_redis_data:

