server {
    listen 8000;
    server_name localhost;

    resolver 127.0.0.11 valid=10s ipv6=off;
    proxy_intercept_errors on;
    error_page 502 503 504 @upstream_error;

    location @upstream_error {
        default_type application/json;
        charset utf-8;
        return 502 '{"error":{"code":"upstream_unavailable","message":"Upstream service unavailable"}}';
    }

    # -----------------------------------------------------------------------
    # Shared proxy settings
    # -----------------------------------------------------------------------
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID      $request_id;

    # -----------------------------------------------------------------------
    # CORS: the gateway is the single source of truth. Strip any
    # Access-Control-* headers that upstream services might emit so the
    # browser never sees duplicated values (which would break CORS).
    #
    # Actual CORS behavior lives in /etc/nginx/snippets/cors-*.conf, rendered
    # at container start from CORS_* env vars by 31-render-cors-snippets.sh.
    # $cors_origin comes from /etc/nginx/conf.d/cors_map.conf (rendered by
    # 30-render-cors-map.sh from CORS_ALLOWED_ORIGINS).
    # -----------------------------------------------------------------------
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;
    proxy_hide_header Access-Control-Max-Age;

    location = / {
        return 200 '{"status":"ok","service":"gateway","message":"API gateway online. Use /v1/*, /health, or /ready/*."}';
        add_header Content-Type application/json;
    }

    # -----------------------------------------------------------------------
    # Upstream routes. To add a new service, copy a pair of location blocks
    # and swap the path prefix, rewrite target and proxy_pass upstream.
    # -----------------------------------------------------------------------

    # Auth
    location = /v1/auth {
        include /etc/nginx/snippets/cors-preflight.conf;
        include /etc/nginx/snippets/cors-headers.conf;
        rewrite ^/v1/auth$ /auth break;
        proxy_pass http://auth:8000;
    }
    location /v1/auth/ {
        include /etc/nginx/snippets/cors-preflight.conf;
        include /etc/nginx/snippets/cors-headers.conf;
        rewrite ^/v1/auth/(.*) /auth/$1 break;
        proxy_pass http://auth:8000;
    }

    # Wallet
    location = /v1/wallet {
        include /etc/nginx/snippets/cors-preflight.conf;
        include /etc/nginx/snippets/cors-headers.conf;
        rewrite ^/v1/wallet$ /wallet break;
        proxy_pass http://wallet:8001;
    }
    location /v1/wallet/ {
        include /etc/nginx/snippets/cors-preflight.conf;
        include /etc/nginx/snippets/cors-headers.conf;
        rewrite ^/v1/wallet/(.*) /$1 break;
        proxy_pass http://wallet:8001;
    }

    # Tokenization
    location = /v1/tokenization {
        include /etc/nginx/snippets/cors-preflight.conf;
        include /etc/nginx/snippets/cors-headers.conf;
        rewrite ^/v1/tokenization$ / break;
        proxy_pass http://tokenization:8002;
    }
    location /v1/tokenization/ {
        include /etc/nginx/snippets/cors-preflight.conf;
        include /etc/nginx/snippets/cors-headers.conf;
        rewrite ^/v1/tokenization/(.*) /$1 break;
        proxy_pass http://tokenization:8002;
    }

    # Marketplace
    location = /v1/marketplace {
        include /etc/nginx/snippets/cors-preflight.conf;
        include /etc/nginx/snippets/cors-headers.conf;
        rewrite ^/v1/marketplace$ / break;
        proxy_pass http://marketplace:8003;
    }
    location /v1/marketplace/ {
        include /etc/nginx/snippets/cors-preflight.conf;
        include /etc/nginx/snippets/cors-headers.conf;
        rewrite ^/v1/marketplace/(.*) /$1 break;
        proxy_pass http://marketplace:8003;
    }

    # Nostr
    location = /v1/nostr {
        include /etc/nginx/snippets/cors-preflight.conf;
        include /etc/nginx/snippets/cors-headers.conf;
        rewrite ^/v1/nostr$ / break;
        proxy_pass http://nostr:8005;
    }
    location /v1/nostr/ {
        include /etc/nginx/snippets/cors-preflight.conf;
        include /etc/nginx/snippets/cors-headers.conf;
        rewrite ^/v1/nostr/(.*) /$1 break;
        proxy_pass http://nostr:8005;
    }

    # Admin
    location = /v1/admin {
        include /etc/nginx/snippets/cors-preflight.conf;
        include /etc/nginx/snippets/cors-headers.conf;
        rewrite ^/v1/admin$ / break;
        proxy_pass http://admin:8006;
    }
    location /v1/admin/ {
        include /etc/nginx/snippets/cors-preflight.conf;
        include /etc/nginx/snippets/cors-headers.conf;
        rewrite ^/v1/admin/(.*) /$1 break;
        proxy_pass http://admin:8006;
    }

    # -----------------------------------------------------------------------
    # Aggregated health & metrics (gateway-level)
    # -----------------------------------------------------------------------

    location = /health {
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }

    location = /health/auth         { proxy_pass http://auth:8000/health; }
    location = /health/wallet       { proxy_pass http://wallet:8001/health; }
    location = /health/tokenization { proxy_pass http://tokenization:8002/health; }
    location = /health/marketplace  { proxy_pass http://marketplace:8003/health; }
    location = /health/nostr        { proxy_pass http://nostr:8005/health; }
    location = /health/admin        { proxy_pass http://admin:8006/health; }

    location = /ready/auth         { proxy_pass http://auth:8000/ready; }
    location = /ready/wallet       { proxy_pass http://wallet:8001/ready; }
    location = /ready/tokenization { proxy_pass http://tokenization:8002/ready; }
    location = /ready/marketplace  { proxy_pass http://marketplace:8003/ready; }
    location = /ready/nostr        { proxy_pass http://nostr:8005/ready; }
    location = /ready/admin        { proxy_pass http://admin:8006/ready; }

    location = /metrics/auth         { proxy_pass http://auth:8000/metrics; }
    location = /metrics/wallet       { proxy_pass http://wallet:8001/metrics; }
    location = /metrics/tokenization { proxy_pass http://tokenization:8002/metrics; }
    location = /metrics/marketplace  { proxy_pass http://marketplace:8003/metrics; }
    location = /metrics/nostr        { proxy_pass http://nostr:8005/metrics; }
    location = /metrics/admin        { proxy_pass http://admin:8006/metrics; }
}
