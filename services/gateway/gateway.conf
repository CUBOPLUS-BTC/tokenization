server {
    listen 8000;
    server_name localhost;

    resolver 127.0.0.11 valid=10s ipv6=off;
    proxy_intercept_errors on;
    error_page 502 503 504 @upstream_error;

    # -----------------------------------------------------------------------
    # Shared proxy settings
    # -----------------------------------------------------------------------
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID      $request_id;

    # -----------------------------------------------------------------------
    # CORS: the gateway is the single source of truth. Strip any
    # Access-Control-* headers that upstream services might emit so the
    # browser never sees duplicated values (which would break CORS).
    #
    # The actual CORS behavior lives in /etc/nginx/snippets/cors.conf,
    # rendered at container start by 31-render-cors-snippets.sh from the
    # CORS_* env vars. $cors_origin is defined in /etc/nginx/conf.d/cors_map.conf
    # (rendered by 30-render-cors-map.sh from CORS_ALLOWED_ORIGINS).
    #
    # Every location below (including error handlers and health probes)
    # MUST `include /etc/nginx/snippets/cors.conf;` so the browser always
    # sees Access-Control-Allow-Origin, even on 4xx/5xx responses.
    # -----------------------------------------------------------------------
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;
    proxy_hide_header Access-Control-Max-Age;

    # -----------------------------------------------------------------------
    # Upstream-failure fallback. Triggered by proxy_intercept_errors when an
    # upstream returns 502/503/504 (or is unreachable). CORS headers MUST
    # be present here too so the browser surfaces the real error to the app
    # instead of an opaque CORS failure.
    # -----------------------------------------------------------------------
    location @upstream_error {
        include /etc/nginx/snippets/cors.conf;
        default_type application/json;
        charset utf-8;
        return 502 '{"error":{"code":"upstream_unavailable","message":"Upstream service unavailable"}}';
    }

    location = / {
        include /etc/nginx/snippets/cors.conf;
        default_type application/json;
        return 200 '{"status":"ok","service":"gateway","message":"API gateway online. Use /v1/*, /health, or /ready/*."}';
    }

    # -----------------------------------------------------------------------
    # Upstream routes. To add a new service, copy a pair of location blocks
    # and swap the path prefix, rewrite target and proxy_pass upstream.
    # Both blocks must `include /etc/nginx/snippets/cors.conf;`.
    # -----------------------------------------------------------------------

    # Auth
    location = /v1/auth {
        include /etc/nginx/snippets/cors.conf;
        rewrite ^/v1/auth$ /auth break;
        proxy_pass http://auth:8000;
    }
    location /v1/auth/ {
        include /etc/nginx/snippets/cors.conf;
        rewrite ^/v1/auth/(.*) /auth/$1 break;
        proxy_pass http://auth:8000;
    }

    # Wallet
    location = /v1/wallet {
        include /etc/nginx/snippets/cors.conf;
        rewrite ^/v1/wallet$ /wallet break;
        proxy_pass http://wallet:8001;
    }
    location /v1/wallet/ {
        include /etc/nginx/snippets/cors.conf;
        rewrite ^/v1/wallet/(.*) /wallet/$1 break;
        proxy_pass http://wallet:8001;
    }

    # Tokenization
    location = /v1/tokenization {
        include /etc/nginx/snippets/cors.conf;
        rewrite ^/v1/tokenization$ / break;
        proxy_pass http://tokenization:8002;
    }
    location /v1/tokenization/ {
        include /etc/nginx/snippets/cors.conf;
        rewrite ^/v1/tokenization/(.*) /$1 break;
        proxy_pass http://tokenization:8002;
    }

    # Marketplace
    location = /v1/marketplace {
        include /etc/nginx/snippets/cors.conf;
        rewrite ^/v1/marketplace$ / break;
        proxy_pass http://marketplace:8003;
    }
    location /v1/marketplace/ {
        include /etc/nginx/snippets/cors.conf;
        rewrite ^/v1/marketplace/(.*) /$1 break;
        proxy_pass http://marketplace:8003;
    }

    # Nostr
    location = /v1/nostr {
        include /etc/nginx/snippets/cors.conf;
        rewrite ^/v1/nostr$ / break;
        proxy_pass http://nostr:8005;
    }
    location /v1/nostr/ {
        include /etc/nginx/snippets/cors.conf;
        rewrite ^/v1/nostr/(.*) /$1 break;
        proxy_pass http://nostr:8005;
    }

    # Admin
    location = /v1/admin {
        include /etc/nginx/snippets/cors.conf;
        rewrite ^/v1/admin$ / break;
        proxy_pass http://admin:8006;
    }
    location /v1/admin/ {
        include /etc/nginx/snippets/cors.conf;
        rewrite ^/v1/admin/(.*) /$1 break;
        proxy_pass http://admin:8006;
    }

    # -----------------------------------------------------------------------
    # Catch-all for unknown /v1/* routes. Without this, nginx would fall
    # through to its default 404 (no CORS headers) and the browser would
    # surface a CORS error instead of a proper 404 JSON payload.
    # Must be declared AFTER all explicit /v1/<service>/ locations so prefix
    # matching still wins for known services.
    # -----------------------------------------------------------------------
    location /v1/ {
        include /etc/nginx/snippets/cors.conf;
        default_type application/json;
        return 404 '{"error":{"code":"not_found","message":"Unknown /v1 route"}}';
    }

    # -----------------------------------------------------------------------
    # Aggregated health, readiness and metrics (gateway-level). Each must
    # include the CORS snippet so browser-based dashboards can hit them.
    # -----------------------------------------------------------------------

    location = /health {
        include /etc/nginx/snippets/cors.conf;
        default_type application/json;
        return 200 '{"status":"ok","service":"gateway"}';
    }

    location = /health/auth         { include /etc/nginx/snippets/cors.conf; proxy_pass http://auth:8000/health; }
    location = /health/wallet       { include /etc/nginx/snippets/cors.conf; proxy_pass http://wallet:8001/health; }
    location = /health/tokenization { include /etc/nginx/snippets/cors.conf; proxy_pass http://tokenization:8002/health; }
    location = /health/marketplace  { include /etc/nginx/snippets/cors.conf; proxy_pass http://marketplace:8003/health; }
    location = /health/nostr        { include /etc/nginx/snippets/cors.conf; proxy_pass http://nostr:8005/health; }
    location = /health/admin        { include /etc/nginx/snippets/cors.conf; proxy_pass http://admin:8006/health; }

    location = /ready/auth         { include /etc/nginx/snippets/cors.conf; proxy_pass http://auth:8000/ready; }
    location = /ready/wallet       { include /etc/nginx/snippets/cors.conf; proxy_pass http://wallet:8001/ready; }
    location = /ready/tokenization { include /etc/nginx/snippets/cors.conf; proxy_pass http://tokenization:8002/ready; }
    location = /ready/marketplace  { include /etc/nginx/snippets/cors.conf; proxy_pass http://marketplace:8003/ready; }
    location = /ready/nostr        { include /etc/nginx/snippets/cors.conf; proxy_pass http://nostr:8005/ready; }
    location = /ready/admin        { include /etc/nginx/snippets/cors.conf; proxy_pass http://admin:8006/ready; }

    location = /metrics/auth         { include /etc/nginx/snippets/cors.conf; proxy_pass http://auth:8000/metrics; }
    location = /metrics/wallet       { include /etc/nginx/snippets/cors.conf; proxy_pass http://wallet:8001/metrics; }
    location = /metrics/tokenization { include /etc/nginx/snippets/cors.conf; proxy_pass http://tokenization:8002/metrics; }
    location = /metrics/marketplace  { include /etc/nginx/snippets/cors.conf; proxy_pass http://marketplace:8003/metrics; }
    location = /metrics/nostr        { include /etc/nginx/snippets/cors.conf; proxy_pass http://nostr:8005/metrics; }
    location = /metrics/admin        { include /etc/nginx/snippets/cors.conf; proxy_pass http://admin:8006/metrics; }
}
