name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Code & Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Basic Secret Scanner
        run: python scripts/scan_secrets.py

      - name: Markdown Lint
        uses: DavidAnson/markdownlint-cli2-action@v15
        with:
          globs: "**/*.md"

  backend-tests:
    name: Backend Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            services/*/requirements.txt
            scripts/requirements-migrations.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          for requirements in services/*/requirements.txt; do
            python -m pip install -r "$requirements"
          done

      - name: Run backend tests
        run: python -m pytest tests -q

  migration-smoke:
    name: Migration Smoke Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: smoke
          POSTGRES_PASSWORD: smoke
          POSTGRES_DB: smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smoke"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+pg8000://smoke:smoke@localhost:5432/smoke
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements-migrations.txt

      - name: Install migration dependencies
        run: python -m pip install -r scripts/requirements-migrations.txt

      - name: alembic downgrade base (initial state)
        run: alembic downgrade base

      - name: alembic upgrade head (apply all migrations)
        run: alembic upgrade head

      - name: alembic current (confirm head stamp)
        run: alembic current

      - name: alembic downgrade base (verify reversibility)
        run: alembic downgrade base

      - name: alembic upgrade head (re-apply to confirm idempotency)
        run: alembic upgrade head

      - name: pytest migration schema assertions
        run: python -m pytest tests/test_migrations_schema.py -q
